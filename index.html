<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammet Gölpınar - Portfolio</title>
    <!-- Nunito Fontu -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- LACİVERT NEON & ÇOKLU RENK PALETİ --- */
        :root {
            --bg-dark: #020617; 
            --card-dark: rgba(15, 23, 42, 0.65); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            
            /* Neon Temel Renkler */
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --neon-green: #10b981;
            --neon-orange: #f59e0b;
            
            /* Özel Kutu Renk Geçişleri */
            --grad-cyan: linear-gradient(135deg, #3b82f6, var(--neon-cyan));
            --grad-purple: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --grad-green: linear-gradient(135deg, var(--neon-green), #3b82f6);
            --grad-orange: linear-gradient(135deg, var(--neon-orange), #ef4444);
            
            --radius: 24px;
        }

        /* --- YENİ: SCROLL PROGRESS BAR --- */
        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 3px;
            background: var(--grad-cyan); z-index: 9999;
            box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.1s ease;
        }

        /* --- YENİ: CUSTOM CURSOR --- */
        body { cursor: none; } /* Varsayılan imleci gizle */
        .cursor {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px;
            background: var(--neon-cyan); border-radius: 50%;
            pointer-events: none; z-index: 10000;
            box-shadow: 0 0 10px var(--neon-cyan); transform: translate(-50%, -50%);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .cursor-follower {
            position: fixed; top: 0; left: 0; width: 30px; height: 30px;
            border: 1px solid rgba(0, 240, 255, 0.5); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: transform 0.1s ease-out, width 0.2s, height 0.2s;
        }
        .cursor.hover { transform: translate(-50%, -50%) scale(1.5); background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        .cursor-follower.hover { width: 50px; height: 50px; border-color: rgba(168, 85, 247, 0.5); background: rgba(168, 85, 247, 0.1); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 1px solid #334155;}
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main); 
            overflow-x: hidden; 
            position: relative;
        }

        /* --- GELİŞTİRİLMİŞ: Arkaplan Neon Animasyonları --- */
        @keyframes floatPulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.25; }
            50% { transform: scale(1.2) translate(50px, 20px); opacity: 0.4; }
            100% { transform: scale(1) translate(0, 0); opacity: 0.25; }
        }
        @keyframes floatPulseReverse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.25; }
            50% { transform: scale(1.3) translate(-40px, -30px); opacity: 0.4; }
            100% { transform: scale(1) translate(0, 0); opacity: 0.25; }
        }

        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%; filter: blur(140px); z-index: -1; 
        }
        body::before { 
            width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; 
            animation: floatPulse 10s infinite ease-in-out;
        }
        body::after { 
            width: 500px; height: 500px; background: var(--neon-purple); bottom: -200px; right: -100px; 
            animation: floatPulseReverse 12s infinite ease-in-out;
        }
        
        a, button, .menu-btn, .close-btn { text-decoration: none; color: inherit; transition: all 0.3s ease; cursor: none; }

        /* --- ÜST BANNER (HERO) --- */
        .banner {
            width: 100%; min-height: 55vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 80px 20px; position: relative;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            background: radial-gradient(circle at top, rgba(30, 58, 138, 0.3) 0%, transparent 70%);
        }

        .img-container {
            position: relative; padding: 5px; border-radius: 50%; margin-bottom: 25px;
            background: var(--grad-cyan);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.4);
            transition: all 0.5s ease;
            z-index: 2;
        }
        .img-container:hover { 
            transform: translateY(-5px) scale(1.05) rotate(5deg); 
            box-shadow: 0 15px 50px rgba(168, 85, 247, 0.6); 
            background: var(--grad-purple); 
        }
        
        .banner-img {
            width: 150px; height: 150px; min-width: 150px; min-height: 150px;
            aspect-ratio: 1 / 1; display: block; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--bg-dark); background: #0f172a;
        }

        .banner h1 { 
            font-size: 46px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
            background: var(--text-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            animation: textGlow 3s infinite alternate;
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
            100% { text-shadow: 0 0 25px rgba(0, 240, 255, 0.6), 0 0 10px rgba(0, 240, 255, 0.4); }
        }

        .banner p { font-size: 16px; font-weight: 800; color: var(--neon-cyan); letter-spacing: 4px; text-transform: uppercase;}

        /* --- SİDEBAR --- */
        .menu-btn {
            position: fixed; top: 25px; right: 25px;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--neon-cyan); width: 55px; height: 55px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; z-index: 1000; 
            border: 1px solid rgba(0, 240, 255, 0.2); transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }
        .menu-btn:hover { background: var(--grad-cyan); color: #020617; border-color: transparent; box-shadow: 0 0 25px rgba(0, 240, 255, 0.4); transform: scale(1.1);}

        .sidebar {
            position: fixed; top: 0; right: -350px;
            width: 320px; height: 100vh; 
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid rgba(0, 240, 255, 0.15); z-index: 1001; 
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 80px 30px;
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
        }
        .sidebar.active { right: 0; }
        .close-btn { position: absolute; top: 30px; right: 30px; color: var(--text-muted); font-size: 26px; transition: 0.3s;}
        .close-btn:hover { color: var(--neon-cyan); transform: rotate(90deg) scale(1.2); text-shadow: 0 0 10px var(--neon-cyan);}
        
        .sidebar ul { list-style: none; }
        .sidebar ul li { margin-bottom: 15px; }
        .sidebar ul li a { 
            color: #cbd5e1; font-size: 17px; font-weight: 700; display: block; 
            padding: 14px 20px; border-radius: 12px; transition: all 0.3s ease; 
            border: 1px solid transparent; position: relative; overflow: hidden;
        }
        .sidebar ul li a::before {
            content: ''; position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,240,255,0.1), transparent);
            transition: 0.4s;
        }
        .sidebar ul li a:hover::before { left: 100%; }
        .sidebar ul li a:hover { background: rgba(0, 240, 255, 0.05); border-color: rgba(0, 240, 255, 0.2); color: var(--neon-cyan); padding-left: 30px; text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);}
        
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); 
            z-index: 999; opacity: 0; visibility: hidden; transition: all 0.4s ease; 
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* --- İÇERİK & GRID --- */
        .container { max-width: 1200px; margin: -40px auto 40px auto; padding: 0 20px; position: relative; z-index: 10; }
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }

        /* GELİŞTİRİLMİŞ: Kart Parlama Efekti */
        .bento-card {
            background-color: var(--card-dark); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius); padding: 35px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
            opacity: 0; transform: translateY(30px);
            position: relative; overflow: hidden;
        }
        
        .bento-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.0) 100%);
            transform: rotate(45deg) translate(-100%, -100%);
            transition: all 0.6s ease; z-index: 1; pointer-events: none;
        }

        .bento-card.visible { opacity: 1; transform: translateY(0); }
        .bento-card:hover { transform: translateY(-8px); z-index: 11; }
        .bento-card:hover::after { transform: rotate(45deg) translate(100%, 100%); }
        
        .bento-card > * { position: relative; z-index: 2; }

        .card-title { font-size: 20px; font-weight: 800; color: white; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }
        .card-title i { -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; }

        /* Renk Temaları */
        .card-about { grid-column: span 2; }
        .card-about .card-title i { background-image: var(--grad-purple); filter: drop-shadow(0 0 8px rgba(168,85,247,0.4));}
        .card-about:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(168, 85, 247, 0.15); }
        #about-text { color: var(--text-muted); line-height: 1.8; font-size: 16px; font-weight: 400; text-align: justify; }

        .card-contact { grid-column: span 1; background: linear-gradient(145deg, rgba(15,23,42,0.8), rgba(30,58,138,0.3));}
        .card-contact .card-title i { background-image: var(--grad-cyan); filter: drop-shadow(0 0 8px rgba(0,240,255,0.4));}
        .card-contact:hover { border-color: rgba(0, 240, 255, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0, 240, 255, 0.15); }
        
        .contact-list { display: flex; flex-direction: column; gap: 20px; }
        .contact-list p { display: flex; align-items: center; gap: 15px; font-size: 15px; font-weight: 600; color: #e2e8f0;}
        .contact-list p i { background: rgba(59, 130, 246, 0.1); color: var(--neon-cyan); padding: 10px; border-radius: 10px; font-size: 16px; transition: 0.3s; border: 1px solid rgba(0, 240, 255, 0.1); -webkit-text-fill-color: var(--neon-cyan); filter: none;}
        .contact-list a { cursor: none;}
        .contact-list a:hover { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); transform: translateX(5px);}
        .contact-list p:hover i { background: var(--grad-cyan); color: #020617; -webkit-text-fill-color: #020617; border-color: transparent; box-shadow: 0 0 15px rgba(0,240,255,0.5); transform: scale(1.1) rotate(10deg);}

        .card-project { grid-column: span 3; }
        .card-project .card-title i { background-image: var(--grad-green); filter: drop-shadow(0 0 8px rgba(16,185,129,0.4));}
        .card-project:hover { border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(16, 185, 129, 0.15); }
        
        .project-header { display: flex; align-items: center; gap: 25px; margin-bottom: 20px; }
        .project-logo { 
            width: 80px; height: 80px; flex-shrink: 0; object-fit: contain; 
            background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 20px; 
            border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }
        .project-header-texts h2 { font-size: 26px; color: white; font-weight: 800;}
        #project-desc { color: var(--text-muted); line-height: 1.8; font-size: 16px; margin-bottom: 25px;}
        
        .btn-project { 
            background: rgba(16, 185, 129, 0.1); color: var(--neon-green); padding: 12px 28px; border-radius: 12px; font-weight: 800; 
            display: inline-flex; align-items: center; gap: 10px; align-self: flex-start; transition: 0.3s;
            border: 1px solid var(--neon-green); box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }
        .btn-project:hover { background: var(--grad-green); color: white; border-color: transparent; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); gap: 15px; }

        .card-education { grid-column: span 1; }
        .card-education .card-title i { background-image: var(--grad-orange); filter: drop-shadow(0 0 8px rgba(245,158,11,0.4));}
        .card-education:hover { border-color: rgba(245, 158, 11, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(245, 158, 11, 0.15); }
        
        .edu-item { border-left: 2px solid rgba(245, 158, 11, 0.2); padding-left: 24px; margin-bottom: 25px; position: relative; transition: 0.3s;}
        .edu-item:hover { border-color: var(--neon-orange); transform: translateX(5px);}
        .edu-item::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--neon-orange); border-radius: 50%; box-shadow: 0 0 12px var(--neon-orange); transition: 0.3s;}
        .edu-item:hover::before { transform: scale(1.5); }
        .edu-year { font-size: 13px; color: var(--neon-orange); font-weight: 800; margin-bottom: 5px; letter-spacing: 1px;}
        .edu-school { font-size: 16px; font-weight: 700; color: white; line-height: 1.4; margin-bottom: 4px;}
        .edu-dep { font-size: 14px; color: var(--text-muted); }

        .card-certificates { grid-column: span 2; }
        .card-certificates .card-title i { background-image: var(--grad-purple); filter: drop-shadow(0 0 8px rgba(236,72,153,0.4));}
        .card-certificates:hover { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(236, 72, 153, 0.15); }
        
        .cert-list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;}
        .cert-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(15, 23, 42, 0.5); border-radius: 16px; border: 1px solid rgba(236, 72, 153, 0.15); transition: 0.3s; }
        .cert-item:hover { background: rgba(236, 72, 153, 0.05); border-color: var(--neon-pink); box-shadow: 0 5px 15px rgba(236, 72, 153, 0.2); transform: translateX(5px) scale(1.02);}
        .cert-item i { font-size: 20px; color: white; background: var(--grad-purple); padding: 12px; border-radius: 12px; box-shadow: 0 0 10px rgba(236, 72, 153, 0.4);}
        .cert-item h5 { font-size: 14px; color: white; font-weight: 700; line-height: 1.3;}
        .cert-item p { font-size: 12px; color: var(--text-muted); margin-top: 4px;}

        .card-skills { grid-column: span 3; }
        .card-skills:hover { border-color: rgba(0, 240, 255, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0, 240, 255, 0.15); }
        
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .skill-box h4 { font-size: 16px; margin-bottom: 18px; color: white; font-weight: 700; display: flex; align-items: center; gap: 12px;}
        
        .skill-box h4 i { 
            color: var(--neon-cyan); background: rgba(0, 240, 255, 0.1); 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 15px; border: 1px solid rgba(0, 240, 255, 0.2);
            text-shadow: 0 0 8px rgba(0,240,255,0.4); box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }
        
        .skill-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tags span { 
            background: rgba(15, 23, 42, 0.8); color: #cbd5e1; cursor: default;
            border: 1px solid rgba(0, 240, 255, 0.15); padding: 8px 16px; border-radius: 10px; 
            font-size: 13px; font-weight: 600; transition: 0.3s; 
        }
        .skill-tags span:hover { background: var(--grad-cyan); color: #020617; border-color: transparent; transform: translateY(-4px) scale(1.05); box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3); font-weight: 800;}
        
        .lang-box h4 i { 
            color: var(--neon-orange); background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); 
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.4); box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
        }
        .lang-box .skill-tags span { border-color: rgba(245, 158, 11, 0.3); }
        .lang-box .skill-tags span:hover { background: var(--grad-orange); color: white; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);}

        /* --- YENİ: YUKARI ÇIK BUTONU --- */
        .scroll-top {
            position: fixed; bottom: -60px; right: 25px;
            width: 50px; height: 50px; background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan); font-size: 20px; z-index: 999;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); transition: all 0.4s ease;
        }
        .scroll-top.show { bottom: 25px; }
        .scroll-top:hover { background: var(--grad-cyan); color: #020617; transform: translateY(-5px); box-shadow: 0 0 25px rgba(0, 240, 255, 0.5); }

        /* --- YENİ: FOOTER --- */
        footer {
            text-align: center; padding: 30px 20px; border-top: 1px solid rgba(0, 240, 255, 0.1);
            margin-top: 40px; color: var(--text-muted); font-size: 14px; position: relative; z-index: 10;
            background: linear-gradient(to top, rgba(2, 6, 23, 1), transparent);
        }
        footer span { color: var(--neon-cyan); font-weight: 700; }

        /* --- MOBİL UYUM --- */
        @media (max-width: 1024px) {
            body { cursor: auto; } /* Mobilde özel imleci kapat */
            .cursor, .cursor-follower { display: none; }
            
            .card-about, .card-contact, .card-education, .card-certificates, .card-project, .card-skills { grid-column: span 3; }
            .cert-list-grid { grid-template-columns: 1fr; }
            
            .menu-btn { width: 45px; height: 45px; font-size: 18px; top: 15px; right: 15px; }
            
            .banner { min-height: 50vh; padding-top: 70px; padding-bottom: 50px; }
            .banner-img { width: 120px; height: 120px; min-width: 120px; min-height: 120px; }
            .banner h1 { font-size: 32px; }
            
            .container { margin-top: -20px; padding: 0 15px; }
            .bento-card { padding: 25px; }
            .bento-grid { gap: 15px; }
            .scroll-top { right: 15px; width: 40px; height: 40px; font-size: 16px;}
        }
    </style>
</head>
<body>

    <!-- Scroll Progress -->
    <div id="scroll-progress"></div>

    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- HAMBURGER MENÜ -->
    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        <ul>
            <li><a href="#hakkimda" onclick="toggleMenu()">Hakkımda</a></li>
            <li><a href="#iletisim" onclick="toggleMenu()">İletişim</a></li>
            <li><a href="#proje" onclick="toggleMenu()">MuGöl PORTAL</a></li>
            <li><a href="#egitim" onclick="toggleMenu()">Eğitim Bilgileri</a></li>
            <li><a href="#sertifikalar" onclick="toggleMenu()">Sertifikalar</a></li>
            <li><a href="#yetenekler" onclick="toggleMenu()">Yetenekler</a></li>
        </ul>
    </nav>

    <!-- ÜST BANNER (HERO) -->
    <header class="banner">
        <div class="img-container">
            <img id="banner-img" src="" alt="Profil" class="banner-img">
        </div>
        <h1 id="banner-name">Yükleniyor...</h1>
        <p id="banner-title"></p>
    </header>

    <!-- İÇERİK KAPSAYICI (BENTO GRID) -->
    <main class="container">
        <div class="bento-grid">
            
            <!-- HAKKIMDA -->
            <div class="bento-card card-about" id="hakkimda">
                <h2 class="card-title"><i class="fas fa-user-astronaut"></i> Hakkımda</h2>
                <p id="about-text">Veriler yükleniyor...</p>
            </div>

            <!-- İLETİŞİM -->
            <div class="bento-card card-contact" id="iletisim">
                <h2 class="card-title"><i class="fas fa-at"></i> İletişim</h2>
                <div class="contact-list">
                    <p id="contact-email"></p>

    <!-- BİLGİ JS DOSYASINI BAĞLAMA (Aynı dizinde kalmalı) -->
    <script src="bilgi.js"></script>

    <!-- ETKİLEŞİM VE ANİMASYON KODLARI -->
    <script>
        // Footer Yıl Güncelleme
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Hamburger Menü Fonksiyonu 
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }
        
        // Scroll İşlemleri (Menü Rengi, Progress Bar, Yukarı Çık Butonu)
        window.addEventListener('scroll', () => {
            const btn = document.querySelector('.menu-btn');
            const scrollTopBtn = document.querySelector('.scroll-top');
            const progressBar = document.getElementById('scroll-progress');
            
            // Progress Bar Hesaplama
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            progressBar.style.width = scrolled + "%";

            // Menü ve Scroll Top Butonu görünürlüğü
            if(window.scrollY > 100) {
                btn.style.background = 'rgba(2, 6, 23, 0.9)';
                btn.style.borderColor = 'rgba(0, 240, 255, 0.4)';
                btn.style.boxShadow = '0 0 15px rgba(0, 240, 255, 0.2)';
                scrollTopBtn.classList.add('show');
            } else {
                btn.style.background = 'rgba(15, 23, 42, 0.5)';
                btn.style.borderColor = 'rgba(0, 240, 255, 0.2)';
                btn.style.boxShadow = '0 0 15px rgba(0, 240, 255, 0.1)';
                scrollTopBtn.classList.remove('show');
            }
        });

        // Custom Cursor Mantığı
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        
        if (window.innerWidth > 1024) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                // Follower biraz gecikmeli takip eder
                setTimeout(() => {
                    cursorFollower.style.left = e.clientX + 'px';
                    cursorFollower.style.top = e.clientY + 'px';
                }, 80);
            });

            // Link ve butonların üzerine gelindiğinde cursor efekti
            const hoverElements = document.querySelectorAll('a, .menu-btn, .close-btn, .scroll-top, .img-container');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.classList.add('hover');
                    cursorFollower.classList.add('hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursor.classList.remove('hover');
                    cursorFollower.classList.remove('hover');
                });
            });
        }

        // KARTLARIN EKRANA GİRİŞ ANİMASYONU 
        document.addEventListener("DOMContentLoaded", () => {
            const observerOptions = { threshold: 0.1, rootMargin: "0px 0px -30px 0px" };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add("visible");
                        }, index * 100); // Gecikme süresi biraz artırıldı
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll(".bento-card").forEach(card => {
                observer.observe(card);
            });
        });
    </script>

</body>
